# One-click SARA wire — drop Vapi API key in GitHub Secrets, system does the rest.

name: Wire SARA (machine speed)

on:
  workflow_dispatch:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write

jobs:
  wire:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request == null &&
        contains(github.event.comment.body, '@cursor') &&
        (
          contains(github.event.comment.body, 'wire sara') ||
          contains(github.event.comment.body, 'connect vapi') ||
          contains(github.event.comment.body, 'machine wire')
        )
      )
    runs-on: ubuntu-latest
    steps:
      - name: Check secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VAPI_API_KEY: ${{ secrets.VAPI_API_KEY }}
        run: |
          test -n "$VPS_HOST" || { echo "::error::Missing VPS_HOST"; exit 1; }
          test -n "$VAPI_API_KEY" || { echo "::error::Missing VAPI_API_KEY"; exit 1; }

      - name: Wire HTTPS + Vapi on VPS
        id: wire_ssh
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          password: ${{ secrets.VPS_SSH_PASSWORD }}
          command_timeout: 20m
          script_stop: true
          envs: VAPI_API_KEY,VAPI_ASSISTANT_ID,VAPI_PHONE_NUMBER_ID,VPS_HOST,WIRE_TOKEN
          script: |
            set -euo pipefail
            cd /opt/Command-center
            git pull origin main
            chmod +x scripts/set-env-safe.sh scripts/setup-sslip-https.sh
            export WIRE_TOKEN="${WIRE_TOKEN:-$(openssl rand -hex 24)}"
            bash scripts/set-env-safe.sh .env \
              VAPI_API_KEY "$VAPI_API_KEY" \
              VAPI_ASSISTANT_ID "$VAPI_ASSISTANT_ID" \
              VAPI_PHONE_NUMBER_ID "$VAPI_PHONE_NUMBER_ID" \
              VPS_PUBLIC_IP "$VPS_HOST" \
              MACHINE_WIRE_TOKEN "$WIRE_TOKEN"
            docker compose up -d --build api
            bash scripts/setup-sslip-https.sh || true
            echo "Waiting for API..."
            for i in $(seq 1 30); do
              curl -fsS http://127.0.0.1:8000/health >/dev/null 2>&1 && break
              sleep 5
            done
            HTTP_CODE=$(curl -sS -o /tmp/wire-result.json -w "%{http_code}" \
              -X POST "http://127.0.0.1:8000/vapi/machine-wire" \
              -H "X-Machine-Wire-Token: $WIRE_TOKEN")
            echo "machine-wire HTTP $HTTP_CODE"
            cat /tmp/wire-result.json
            echo ""
            if [ "$HTTP_CODE" = "200" ] && grep -q '"ok":true' /tmp/wire-result.json 2>/dev/null; then
              echo "=== SARA WIRED ==="
              cat vault/commander/vapi-wire.json 2>/dev/null || cat /tmp/wire-result.json
            else
              echo "=== WIRE FAILED — see JSON above ==="
              exit 1
            fi
        env:
          VAPI_API_KEY: ${{ secrets.VAPI_API_KEY }}
          VAPI_ASSISTANT_ID: ${{ secrets.VAPI_ASSISTANT_ID }}
          VAPI_PHONE_NUMBER_ID: ${{ secrets.VAPI_PHONE_NUMBER_ID }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          WIRE_TOKEN: ${{ secrets.MACHINE_WIRE_TOKEN }}

      - name: Verify public HTTPS health
        continue-on-error: true
        run: |
          HOST="${{ secrets.VPS_HOST }}"
          SSLIP="${HOST//./-}.sslip.io"
          if curl -fsSk --max-time 20 "https://${SSLIP}/health"; then
            echo "SARA webhook: https://${SSLIP}/vapi/webhook" >> "$GITHUB_STEP_SUMMARY"
            echo "Portal: https://${SSLIP}/" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "HTTPS not ready — open ports 80+443 in Servury, then re-run Wire SARA" >> "$GITHUB_STEP_SUMMARY"
            echo "API still on http://${HOST}:8000" >> "$GITHUB_STEP_SUMMARY"
          fi
