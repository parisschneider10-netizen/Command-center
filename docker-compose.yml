services:
  # ── Layer 0: Data store ──────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-empire}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-empire}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-empire}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Layer 3: Orchestration ───────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    ports:
      - "0.0.0.0:5678:5678"
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-empire}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-empire}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:-change-me-postgres}
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost:5678}
      GENERIC_TIMEZONE: ${TZ:-UTC}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-change-me-n8n-encryption-key}
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Layer 3: Voice OS API ────────────────────────────────
  api:
    build: ./server
    ports:
      - "0.0.0.0:8000:8000"
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./vault:/app/vault
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── Layer 5: Command Center portal ─────────────────────
  portal:
    build: ./portal
    ports:
      - "0.0.0.0:3000:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

